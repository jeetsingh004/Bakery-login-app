<!DOCTYPE html>
<html>

<head>
  <title>ChatBot</title>
  <style>
    body {
      font-family: Arial;
    }

    .title {
      font-size: 25px;
    }

    .login-input {
      padding: 10px 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      border-width: 1px;
      width: 200px;
    }

    .Login-button {
      background-color: rgb(0, 123, 255);
      color: white;
      margin-right: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hide-button {
      background-color: rgb(108, 117, 125);
      color: white;
      margin-left: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="js-container"></div>

  <script src="react-basics.js"></script>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

  <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">

    function LoginForm() {

      const [showPassword, updateShowPassword] = React.useState(false)

      function TogglePassword() {
        if(showPassword) {
          updateShowPassword(false)
        } else {
          updateShowPassword(true)
        }
      }

      return (
        <>
          <div>
            <input
              placeholder="Email"
              className="login-input"
            />
          </div>
          <div>
            <input
              placeholder="Password"
              type={showPassword ? 'text' : 'password'}
              className="login-input"
            />
            <button className="hide-button" onClick={TogglePassword}>{showPassword ? 'hide' : 'show'}</button>
          </div>
          <button className="Login-button">Login</button>
          <button className="Login-button">Sign up</button>
        </>
      )
    }

    function App() {
      return (
        <>
          <p className="title">Hello, Welcome to my website</p>
          <LoginForm />
        </>
      )
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);

  </script>
</body>

</html>
